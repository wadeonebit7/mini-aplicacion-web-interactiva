<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mosearch</title>
        <link rel="stylesheet" href="/css/styles-movie.css">
    </head>
    <body>
        <header>
            <nav>
                <div class="container">
                    <ul>
                        <li><a href="/register">Registrarse</a></li>
                        <li><a href="/login">Iniciar Sesion</a></li>
                    </ul>
                </div>
            </nav>
        </header>
        <div class="media_container">
            <article class="pelicula-card">
                <h2>EDGE OF TOMORROW</h2>
                <div class="media-content">
                    <img src="img/edge_of_tomorrow.jpg" alt="Edge Of Tomorrow">
                    <video controls>
                        <source src="media/edge_of_tomorrow.mp4" type="video/mp4">
                    </video>
                </div>
            </article>
            
            <article class="pelicula-card">
                <h2>PASAJEROS</h2>
                <div class="media-content">
                    <img src="img/pasajeros.jpg" alt="Pasajeros">
                    <video controls>
                        <source src="media/pasajeros.mp4" type="video/mp4">
                    </video>
                </div>
            </article>

            <article class="pelicula-card">
                <h2>LA GUERRA DEL MAÑANA</h2>
                <div class="media-content">
                    <img src="img/la_guerra_del_mañana.jpg" alt="La Guerra del Mañana">
                    
                    <video controls>
                        <source src="media/la_guerra_del_mañana.mp4" type="video/mp4">
                    </video>
                </div>
            </article>
        </div>
        <hr>
        <h2>Foro de Criticas</h2>
        <form class="formulario-contacto" id="movieForm">
            <div>
                <label for="username">Username: </label>
                <input type="text" id="username" placeholder="Ej: NekoCaos99">
                <span id="usernameError" class="error-text"></span>
            </div>
            <div>
                <label for="correo">Correo electronico: </label>
                <input type="email" id="correo" placeholder="tu@email.com">
                <span id="correoError" class="error-text"></span>
            </div>
            <div>
                <label for="titulo">Titulo: </label>
                <input type="text" id="titulo" placeholder="Ej: Exelente trama">
                <span id="tituloError" class="error-text"></span>
                <span id="contenidoError" class="error-text"></span>
            </div>
            <div>
                <label for="Contenido">Contenido: </label>
                <textarea id="contenido" rows="5" placeholder="Escribe tu mensaje aqui..."></textarea>
                <span id="contenidoError" class="error-text"></span>
            </div>

            <button type="submit" class="btn-enviar">Enviar Mensaje</button>
        </form>

        <h2>Reseñas Recientes de la Comunidad</h2>
        <div id="commentsContainer"></div>

        <script src="js/movie-behavior.js"></script>
    </body>
</html>
